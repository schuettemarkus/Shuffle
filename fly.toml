# Fly.io app config for the Shuffle game server.
#
# Defaults: one always-on shared-cpu-1x@256MB machine in iad. WebSocket
# connections stay healthy because the machine never auto-stops, so an
# in-progress hand can't be killed by an idle scale-down.
#
# If you want to trade reliability for $0-when-idle, flip:
#   auto_stop_machines = "stop"
#   min_machines_running = 0
# Cold-start to first byte is ~1s; any in-flight game would be cut.

app = "shuffle-server"
primary_region = "iad"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "2567"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for the leaderboard JSON file. Fly volumes are durable
# across machine restarts so the per-lobby stats survive a deploy.
[[mounts]]
  source = "shuffle_data"
  destination = "/app/apps/server/data"
